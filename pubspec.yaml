name: dpd_flutter_app
description: "Digital Pali Dictionary - offline Flutter app"
publish_to: 'none'

version: 0.1.1+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Database
  drift: ^2.23.1
  drift_flutter: ^0.2.4
  sqlite3_flutter_libs: ^0.5.28

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # HTTP for DB download/update check
  dio: ^5.8.0+1

  # File system access for DB management
  path_provider: ^2.1.5
  path: ^1.9.1

  # Preferences (settings, first-launch flag)
  shared_preferences: ^2.5.3

  # URL launcher (open sutta links)
  url_launcher: ^6.3.1

  # Fonts
  google_fonts: ^6.2.1

  # Progress indicator for DB download
  percent_indicator: ^4.2.3

  # Zip extraction for DB download
  archive: ^4.0.4

  # Network connectivity check (WiFi-only updates)
  connectivity_plus: ^6.1.4

  # App version info
  package_info_plus: ^8.3.0

  # Device info (feedback form)
  device_info_plus: ^11.2.2

  # APK installer (app self-update)
  open_filex: ^4.7.0

  # SVG rendering (logo)
  flutter_svg: ^2.0.17
  just_audio: ^0.10.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Drift code generation
  drift_dev: ^2.23.0
  build_runner: ^2.4.14
  riverpod_generator: ^2.6.5

  # Icon and splash generation
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.5

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/help/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/dpd-logo-dark-512.png"
  min_sdk_android: 21
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/images/dpd-logo-dark-512.png"
  remove_alpha_ios: true
  web:
    generate: true
    image_path: "assets/images/dpd-logo-dark-512.png"
    background_color: "#ffffff"
    theme_color: "#ffffff"
  windows:
    generate: true
    image_path: "assets/images/dpd-logo-dark-512.png"
    icon_size: 48
  macos:
    generate: true
    image_path: "assets/images/dpd-logo-dark-512.png"
  linux:
    generate: true
    image_path: "assets/images/dpd-logo-dark-512.png"

flutter_native_splash:
  color: "#ffffff"
  color_dark: "#121212"
  image: assets/images/dpd-logo-512.png
  image_dark: assets/images/dpd-logo-dark-512.png
  android: true
  ios: true
  web: true
  android_12:
    image: assets/images/dpd-logo-512.png
    icon_background_color: "#ffffff"
    image_dark: assets/images/dpd-logo-dark-512.png
    icon_background_color_dark: "#121212"
